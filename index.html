<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Live IPTV - Infinite Notice Player</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b111e; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
        
        .video-js .vjs-poster, 
        .video-js .vjs-poster img,
        .vjs-poster {
            background-size: 100% 100% !important;
            object-fit: cover !important;
            width: 100% !important;
            height: 100% !important;
        }

        .channel-card.active-channel {
            border-color: #3b82f6 !important;
            background-color: #1e293b !important;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.3);
        }

        /* ঝাঁকি ছাড়া ফুলস্ক্রিন ফিক্স সিএসএস */
        .video-js.vjs-full-window {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 99999 !important;
            background-color: #000 !important;
        }
        .video-js.vjs-full-window .vjs-tech {
            object-fit: fill !important;
        }

        /* 📢 অলটাইম নিরবচ্ছিন্ন (Infinite Loop) নোটিশের জন্য কাস্টম সিএসএস */
        .notice-container {
            display: flex;
            overflow: hidden;
            width: 100%;
            white-space: nowrap;
        }
        .notice-scroller {
            display: inline-block;
            padding-left: 100%;
            animation: marqueeEffect 25s linear infinite;
        }
        @keyframes marqueeEffect {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        @media (max-width: 1023px) and (orientation: landscape) {
            html, body { overflow: hidden !important; height: 100vh !important; }
            header, #notice-bar, #sidebar-wrapper, #title-area { display: none !important; }
            main { height: 100vh !important; padding: 0 !important; margin: 0 !important; max-width: 100% !important; width: 100vw !important; }
            #player-wrapper, #player-wrapper > div, .aspect-video { width: 100vw !important; height: 100vh !important; border: none !important; border-radius: 0 !important; padding: 0 !important; margin: 0 !important; }
            .video-js, .video-js .vjs-tech, .video-js video { width: 100vw !important; height: 100vh !important; object-fit: fill !important; transition: none !important; }
        }
    </style>
</head>
<body class="text-gray-200 min-h-screen flex flex-col lg:h-screen">

    <header class="bg-[#0f172a] border-b border-[#1e293b] px-6 py-4 flex items-center justify-between sticky top-0 z-50 h-[70px]">
        <div class="flex items-center space-x-2">
            <i class="fa-solid fa-tv text-2xl text-blue-500 animate-pulse"></i>
            <h1 class="text-2xl font-bold tracking-wider text-white flex items-center gap-1">
                LIVE <span class="text-amber-400 font-extrabold">IPTV</span>
                <i class="fa-solid fa-sun text-xs text-amber-400 ml-1"></i>
            </h1>
        </div>
        <div class="flex items-center space-x-4 text-sm text-gray-400">
            <span class="hidden md:inline font-medium">Premium Laptop IPTV Player</span>
            <span class="bg-[#1e293b] text-blue-400 px-4 py-1.5 rounded-full text-xs font-semibold border border-blue-500/20 shadow-sm">
                <i class="fa-solid fa-layer-group mr-1"></i> <span id="channel-count" class="text-white font-bold">0</span> Channels
            </span>
        </div>
    </header>

    <div id="notice-bar" class="w-full bg-[#131c31] border-b border-[#1e293b] px-4 py-1 flex items-center gap-2 z-40 shrink-0 h-[28px] overflow-hidden">
        <div class="flex items-center space-x-1 text-amber-400 text-[9px] font-bold uppercase tracking-wider bg-amber-500/10 px-1.5 py-0.5 rounded border border-amber-500/10 whitespace-nowrap z-10">
            <i class="fa-solid fa-bullhorn text-[8px] animate-bounce"></i>
            <span>Notice</span>
        </div>
        <div class="flex-1 notice-container text-[11px] text-gray-300">
            <div class="notice-scroller font-medium leading-none">
                স্বাগতম! আমাদের লাইভ আইপিটিভি প্লেলিস্টটি সফলভাবে আপডেট করা হয়েছে। বাফারিং মুক্ত স্ট্রিমিং উপভোগ করুন।
            </div>
        </div>
    </div>

    <main class="flex-1 flex flex-col lg:flex-row p-4 gap-4 max-w-[1800px] w-full mx-auto overflow-hidden h-[calc(100vh-98px)]">
        
        <div id="player-wrapper" class="w-full lg:flex-1 flex flex-col gap-4 h-full overflow-hidden justify-center">
            <div class="bg-[#0f172a] rounded-xl p-4 border border-[#1e293b] shadow-2xl flex flex-col justify-center">
                <div id="title-area" class="flex items-center justify-between mb-3 px-1">
                    <div class="flex items-center space-x-2">
                        <span class="w-3 h-3 bg-emerald-500 rounded-full animate-ping"></span>
                        <span id="current-channel-title" class="font-bold text-white tracking-wide text-base md:text-lg">একটি চ্যানেল সিলেক্ট করুন</span>
                    </div>
                    <span class="text-xs bg-red-600/20 text-red-400 px-3 py-1 rounded font-bold uppercase tracking-widest border border-red-500/30">Live</span>
                </div>
                
                <div class="relative w-full rounded-xl overflow-hidden bg-black border border-[#1e293b] shadow-inner aspect-video">
                    <video id="iptv-player" class="video-js vjs-default-skin vjs-big-play-centered w-full h-full" controls preload="auto" playsinline webkit-playsinline>
                        <p class="vjs-no-js">To view this video please enable JavaScript</p>
                    </video>
                </div>
            </div>
        </div>

        <div id="sidebar-wrapper" class="w-full lg:w-[450px] bg-[#0f172a] rounded-xl border border-[#1e293b] flex flex-col h-[500px] lg:h-full shadow-2xl overflow-hidden shrink-0">
            
            <div class="p-3 bg-[#111a2e] border-b border-[#1e293b] grid grid-cols-2 gap-3 shrink-0">
                <div class="flex flex-col gap-1">
                    <label for="category-select" class="text-[11px] font-semibold text-gray-400 flex items-center gap-1">
                        <i class="fa-solid fa-filter text-blue-400"></i> ক্যাটাগরি:
                    </label>
                    <select id="category-select" class="w-full bg-[#1e293b] text-gray-200 border border-[#334155] rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:border-blue-500 transition-colors cursor-pointer font-medium">
                        <option value="all">All Channels</option>
                    </select>
                </div>

                <div class="flex flex-col gap-1">
                    <label for="search-input" class="text-[11px] font-semibold text-gray-400 flex items-center gap-1">
                        <i class="fa-solid fa-magnifying-glass text-amber-400"></i> চ্যানেল খুঁজুন:
                    </label>
                    <div class="relative w-full">
                        <input id="search-input" type="text" placeholder="নাম লিখুন..." class="w-full bg-[#1e293b] text-gray-200 border border-[#334155] rounded-lg pl-2 pr-7 py-1.5 text-xs focus:outline-none focus:border-blue-500 transition-colors font-medium">
                        <i class="fa-solid fa-search absolute right-2.5 top-2.5 text-gray-500 text-[10px]"></i>
                    </div>
                </div>
            </div>

            <div id="channels-list" class="flex-1 overflow-y-auto p-4 grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-3 gap-3 content-start">
                <p class="col-span-full text-center text-gray-500 text-sm py-8">M3U প্লেলিস্ট লোড হচ্ছে...</p>
            </div>
        </div>

    </main>

    <script>
        const m3uPlaylistUrl = "https://raw.githubusercontent.com/ahmedstore75/Iptvbdlive/refs/heads/main/mixiptvchannel.m3u"; 
        const defaultPosterUrl = "https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=1000";

        let playlistData = [];
        let player;

        document.addEventListener('DOMContentLoaded', () => {
            player = videojs('iptv-player', { 
                fluid: false, 
                fill: true,
                controls: true, 
                liveui: true,
                poster: defaultPosterUrl,
                preferFullWindow: true 
            });
            
            fetchM3UPlaylist();
            setupOrientationFullscreen();

            document.getElementById('category-select').addEventListener('change', () => {
                document.getElementById('search-input').value = "";
                filterAndRender();
            });

            document.getElementById('search-input').addEventListener('input', () => {
                filterAndRender();
            });
        });

        function setupOrientationFullscreen() {
            const handleOrientationChange = () => {
                const isLandscape = window.matchMedia("(orientation: landscape)").matches || (window.innerWidth > window.innerHeight);
                if (window.innerWidth < 1024) { 
                    if (isLandscape) {
                        if (player && !player.isFullscreen()) { player.enterFullWindow(); }
                    } else {
                        if (player && player.isFullscreen()) { player.exitFullWindow(); }
                    }
                }
            };
            if (window.screen && window.screen.orientation) {
                window.screen.orientation.addEventListener('change', () => { setTimeout(handleOrientationChange, 150); });
            } else {
                window.addEventListener("orientationchange", () => { setTimeout(handleOrientationChange, 150); });
            }
            window.addEventListener("resize", () => { setTimeout(handleOrientationChange, 100); });
        }

        async function fetchM3UPlaylist() {
            try {
                const response = await fetch(m3uPlaylistUrl);
                if (!response.ok) throw new Error("Network response error");
                const m3uText = await response.text();
                playlistData = parseM3U(m3uText);
                
                document.getElementById('channel-count').innerText = playlistData.length;
                
                populateCategories(); 
                filterAndRender(); 
            } catch (error) {
                console.error("Error loading M3U:", error);
                document.getElementById('channels-list').innerHTML = `<p class="col-span-full text-center text-red-400 text-sm py-8">প্লেলিস্ট লোড করতে ব্যর্থ হয়েছে! লিংক বা CORS চেক করুন।</p>`;
            }
        }

        function parseM3U(m3uString) {
            const lines = m3uString.split('\n');
            const channels = [];
            let currentChannel = null;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();

                if (line.startsWith('#EXTINF:')) {
                    currentChannel = {};
                    const tvgLogoMatch = line.match(/tvg-logo="([^"]+)"/i);
                    currentChannel.logo = tvgLogoMatch ? tvgLogoMatch[1] : "";

                    const groupTitleMatch = line.match(/group-title="([^"]+)"/i);
                    currentChannel.category = groupTitleMatch ? groupTitleMatch[1].trim() : "Uncategorized";

                    const nameParts = line.split(',');
                    currentChannel.name = nameParts[nameParts.length - 1].trim() || "Unknown Channel";
                } else if (line.startsWith('http') && currentChannel) {
                    currentChannel.url = line;
                    channels.push(currentChannel);
                    currentChannel = null;
                }
            }
            return channels;
        }

        function populateCategories() {
            const select = document.getElementById('category-select');
            const categories = [...new Set(playlistData.map(channel => channel.category))];
            
            categories.forEach(category => {
                if(category) {
                    const option = document.createElement('option');
                    option.value = category;
                    option.innerText = category;
                    select.appendChild(option);
                }
            });
        }

        function filterAndRender() {
            const selectedCategory = document.getElementById('category-select').value;
            const searchQuery = document.getElementById('search-input').value.toLowerCase().trim();
            const container = document.getElementById('channels-list');
            container.innerHTML = "";

            let filteredChannels = [];

            if (searchQuery !== "") {
                filteredChannels = playlistData.filter(channel => 
                    channel.name.toLowerCase().includes(searchQuery)
                );
            } else {
                filteredChannels = selectedCategory === 'all' 
                    ? playlistData 
                    : playlistData.filter(channel => channel.category === selectedCategory);
            }

            if(filteredChannels.length === 0) {
                container.innerHTML = `<p class="col-span-full text-center text-gray-500 text-sm py-8">কোনো চ্যানেল পাওয়া যায়নি!</p>`;
                return;
            }

            filteredChannels.forEach((channel, index) => {
                const card = document.createElement('div');
                
                let cardBg = "bg-[#131c31] border-[#1e293b]";
                if (index % 3 === 1) { cardBg = "bg-[#16223f] border-[#243765]"; } 
                else if (index % 3 === 2) { cardBg = "bg-[#111a2e] border-[#1c2a4a]"; }

                card.className = `channel-card ${cardBg} border rounded-xl p-3 flex flex-col items-center justify-between text-center cursor-pointer hover:border-blue-500/60 hover:bg-[#1b2b4d] transition-all group relative h-36 shrink-0`;
                
                card.innerHTML = `
                    <div class="star-icon absolute top-2 right-2 text-gray-600 group-hover:text-amber-400 transition-colors">
                        <i class="fa-regular fa-star text-[10px]"></i>
                    </div>
                    <div class="w-16 h-16 bg-[#0b111e] rounded-lg mb-2 flex items-center justify-center p-1.5 border border-[#1e293b] group-hover:scale-105 transition-transform overflow-hidden shadow-md">
                        <img src="${channel.logo}" alt="" class="w-full h-full object-contain rounded" onerror="this.src='https://placehold.co/150x150/0f172a/white?text=TV'">
                    </div>
                    <h4 class="text-[11px] font-semibold text-gray-300 group-hover:text-white line-clamp-2 w-full px-1 leading-tight">${channel.name}</h4>
                `;

                card.addEventListener('click', () => playChannel(channel, card));
                container.appendChild(card);
            });
        }

        function playChannel(channel, selectedCardElement) {
            document.getElementById('current-channel-title').innerText = channel.name;
            
            document.querySelectorAll('.channel-card').forEach(card => {
                card.classList.remove('active-channel');
                const iconContainer = card.querySelector('.star-icon');
                if (iconContainer) {
                    iconContainer.innerHTML = '<i class="fa-regular fa-star text-[10px]"></i>';
                }
            });

            if (selectedCardElement) {
                selectedCardElement.classList.add('active-channel');
                const activeIcon = selectedCardElement.querySelector('.star-icon');
                if (activeIcon) {
                    activeIcon.innerHTML = '<i class="fa-solid fa-star text-[10px]"></i>';
                }
            }

            player.poster(""); 
            player.src({ src: channel.url, type: 'application/x-mpegURL' });
            player.load();
            player.play().catch(err => {
                console.log("Playback error:", err);
                document.getElementById('current-channel-title').innerText = channel.name + " (প্লে হতে সমস্যা হচ্ছে...)";
            });
        }
    </script>
</body>
</html>
