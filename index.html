<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live IPTV</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Video.js for HLS (.m3u8) streaming -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <!-- Google Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b111e; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body class="text-gray-200 min-h-screen flex flex-col">

    <!-- Header Section -->
    <header class="bg-[#0f172a] border-b border-[#1e293b] px-4 py-3 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center space-x-2">
            <i class="fa-solid fa-tv text-xl text-blue-500 animate-pulse"></i>
            <h1 class="text-xl font-bold tracking-wider text-white flex items-center gap-1">
                LIVE <span class="text-amber-400 font-extrabold">IPTV</span>
                <i class="fa-solid fa-sun text-xs text-amber-400 ml-1"></i>
            </h1>
        </div>
        <div class="flex items-center space-x-4 text-sm text-gray-400">
            <span class="hidden md:inline">Premium IPTV Player</span>
            <span class="bg-[#1e293b] text-blue-400 px-3 py-1 rounded-full text-xs font-semibold border border-blue-500/20">
                <i class="fa-solid fa-layer-group mr-1"></i> <span id="channel-count">0</span> Channels
            </span>
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="flex-1 flex flex-col lg:flex-row p-4 gap-4 max-w-[1600px] w-full mx-auto overflow-hidden">
        
        <!-- Left Column: Player & Categories -->
        <div class="flex-1 flex flex-col gap-4">
            <!-- Video Player Dashboard -->
            <div class="bg-[#0f172a] rounded-xl p-3 border border-[#1e293b] shadow-2xl">
                <div class="flex items-center justify-between mb-2 px-1">
                    <div class="flex items-center space-x-2">
                        <span class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-ping"></span>
                        <span id="current-channel-title" class="font-semibold text-white tracking-wide text-sm md:text-base">একটি চ্যানেল সিলেক্ট করুন</span>
                    </div>
                    <span class="text-xs bg-red-600/20 text-red-400 px-2 py-0.5 rounded font-bold uppercase tracking-widest border border-red-500/30">Live</span>
                </div>
                
                <!-- Compact Player Box -->
                <div id="player-container" class="relative w-full md:w-2/3 rounded-lg overflow-hidden bg-black border border-[#1e293b] mx-auto shadow-inner">
                    <video id="iptv-player" class="video-js vjs-default-skin vjs-big-play-centered w-full h-full" controls preload="auto" poster="https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=1000">
                        <p class="vjs-no-js">To view this video please enable JavaScript</p>
                    </video>
                </div>
            </div>

            <!-- Categories Filter -->
            <div class="bg-[#0f172a] p-3 rounded-xl border border-[#1e293b]">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 px-1">Categories</h3>
                <div id="category-container" class="flex gap-2 overflow-x-auto pb-1 snap-x scroll-smooth">
                    <button class="snap-start shrink-0 px-4 py-2 rounded-lg text-xs font-semibold border bg-blue-600 text-white border-blue-500">Loading...</button>
                </div>
            </div>
        </div>

        <!-- Right Column: Notice Board & Mixed Color Channel Grid -->
        <div class="w-full lg:w-[400px] bg-[#0f172a] rounded-xl border border-[#1e293b] flex flex-col h-[500px] lg:h-[calc(100vh-120px)] shadow-2xl">
            
            <!-- Notice Board Section -->
            <div class="p-4 border-b border-[#1e293b] bg-gradient-to-r from-[#131c31] to-[#1e293b] rounded-t-xl">
                <div class="flex items-center space-x-2 text-amber-400 text-xs font-bold uppercase tracking-wider mb-1">
                    <i class="fa-solid fa-bullhorn animate-bounce"></i>
                    <span>Notice Board</span>
                </div>
                <div class="bg-[#0b111e]/80 border border-amber-500/20 rounded-lg p-2 text-xs text-gray-300 overflow-hidden relative">
                    <marquee behavior="scroll" direction="left" scrollamount="4" class="font-medium">
                        স্বাগতম! আমাদের লাইভ আইপিটিভি প্লেলিস্টটি সফলভাবে আপডেট করা হয়েছে। ল্যাপটপ এবং মোবাইলে বাফারিং মুক্ত স্ট্রিমিং উপভোগ করুন।
                    </marquee>
                </div>
            </div>

            <!-- Channels Grid (Bigger & Full-Screen Logo Design) -->
            <div id="channels-list" class="flex-1 overflow-y-auto p-4 grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-2 gap-4 content-start">
                <p class="col-span-full text-center text-gray-500 text-sm py-8">M3U প্লেলিস্ট লোড হচ্ছে...</p>
            </div>
        </div>

    </main>

    <!-- Script Section -->
    <script>
        // আপনার দেওয়া আসল M3U লিংক
        const rawM3uUrl = "https://raw.githubusercontent.com/ahan443/FAST-IPTV/refs/heads/main/combined_playlist.m3u"; 
        
        // 🛠️ ল্যাপটপে লোড না হওয়ার সমস্যা (CORS) সমাধানের জন্য অল্টারনেটিভ অল-ওপেন প্রক্সি প্রসেস
        const m3uPlaylistUrl = `https://cors-anywhere.herokuapp.com/${rawM3uUrl}`;
        const fallbackM3uUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(rawM3uUrl)}`;

        let playlistData = [];
        let currentCategory = "All";
        let player;

        document.addEventListener('DOMContentLoaded', () => {
            player = videojs('iptv-player', { fluid: true, controls: true, liveui: true });
            fetchM3UPlaylist(fallbackM3uUrl); // AllOrigins প্রক্সি দিয়ে প্রথমে চেষ্টা করা হবে যা ল্যাপটপে ভালো কাজ করে
        });

        // Fetch and Parse M3U File
        async function fetchM3UPlaylist(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Network response error");
                const m3uText = await response.text();
                playlistData = parseM3U(m3uText);
                
                document.getElementById('channel-count').innerText = playlistData.length;
                renderCategories();
                renderChannels();
            } catch (error) {
                console.error("Error loading M3U via primary proxy, trying backup...", error);
                if(url !== m3uPlaylistUrl) {
                    fetchM3UPlaylist(m3uPlaylistUrl); // সমস্যা হলে অল্টারনেটিভ প্রক্সি ট্রাই করবে
                } else {
                    document.getElementById('channels-list').innerHTML = `<p class="col-span-full text-center text-red-400 text-sm py-8">প্লেলিস্টটি সিকিউরিটি বা ব্রাউজার ব্লকিং জনিত কারণে লোড করা যায়নি। এটি কোনো লোকাল বা ওয়েব সার্ভারে আপলোড করে ওপেন করুন।</p>`;
                }
            }
        }

        // Custom M3U Parser
        function parseM3U(m3uString) {
            const lines = m3uString.split('\n');
            const channels = [];
            let currentChannel = null;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();

                if (line.startsWith('#EXTINF:')) {
                    currentChannel = {};
                    const tvgLogoMatch = line.match(/tvg-logo="([^"]+)"/i);
                    currentChannel.logo = tvgLogoMatch ? tvgLogoMatch[1] : "";

                    const groupTitleMatch = line.match(/group-title="([^"]+)"/i);
                    currentChannel.category = groupTitleMatch ? groupTitleMatch[1] : "General";

                    const nameParts = line.split(',');
                    currentChannel.name = nameParts[nameParts.length - 1].trim() || "Unknown Channel";
                } else if (line.startsWith('http') && currentChannel) {
                    currentChannel.url = line;
                    channels.push(currentChannel);
                    currentChannel = null;
                }
            }
            return channels;
        }

        // Render Categories
        function renderCategories() {
            const categories = ["All", ...new Set(playlistData.map(item => item.category))];
            const container = document.getElementById('category-container');
            container.innerHTML = "";

            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `snap-start shrink-0 px-4 py-2 rounded-lg text-xs font-semibold border transition-all cursor-pointer ${
                    currentCategory === cat 
                    ? 'bg-blue-600 text-white border-blue-500 shadow-lg shadow-blue-500/20' 
                    : 'bg-[#131c31] text-gray-400 border-[#1e293b] hover:bg-[#1e293b] hover:text-white'
                }`;
                btn.innerText = cat;
                btn.addEventListener('click', () => {
                    currentCategory = cat;
                    renderCategories();
                    renderChannels();
                });
                container.appendChild(btn);
            });
        }

        // Render Channels Grid (Bigger full-box image styling)
        function renderChannels() {
            const container = document.getElementById('channels-list');
            container.innerHTML = "";

            const filteredChannels = playlistData.filter(channel => {
                return (currentCategory === "All" || channel.category === currentCategory);
            });

            if(filteredChannels.length === 0) {
                container.innerHTML = `<p class="col-span-full text-center text-gray-500 text-sm py-8">No channels found</p>`;
                return;
            }

            filteredChannels.forEach((channel, index) => {
                const card = document.createElement('div');
                let cardBg = "bg-[#131c31] border-[#1e293b]";
                if (index % 3 === 1) {
                    cardBg = "bg-[#16223f] border-[#243765]"; 
                } else if (index % 3 === 2) {
                    cardBg = "bg-[#111a2e] border-[#1c2a4a]"; 
                }

                card.className = `${cardBg} border rounded-xl p-2 flex flex-col justify-between items-center cursor-pointer hover:border-blue-500/70 hover:bg-[#1b2b4d] transition-all group overflow-hidden h-36 relative`;
                
                // লোগোকে ফুল কাভার স্কিন দেওয়া হয়েছে
                card.innerHTML = `
                    <div class="w-full h-24 bg-[#0b111e] rounded-lg overflow-hidden border border-[#1e293b] relative group-hover:scale-102 transition-transform shadow-md">
                        <img src="${channel.logo}" alt="" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/300x200/0f172a/white?text=LIVE+TV'">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-1.5 justify-center">
                             <i class="fa-solid fa-circle-play text-white text-lg drop-shadow-lg"></i>
                        </div>
                    </div>
                    <h4 class="text-[11px] font-semibold text-gray-300 group-hover:text-white line-clamp-1 w-full text-center mt-2 px-1 truncate">${channel.name}</h4>
                `;

                card.addEventListener('click', () => playChannel(channel));
                container.appendChild(card);
            });
        }

        // Play Channel Function
        function playChannel(channel) {
            document.getElementById('current-channel-title').innerText = channel.name;
            player.src({ src: channel.url, type: 'application/x-mpegURL' });
            player.play().catch(err => console.log("Playback error:", err));
        }
    </script>
</body>
</html>
